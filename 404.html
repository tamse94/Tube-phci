<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Oops!</title>
  <link rel="stylesheet" href="404.css">
</head>
<body>
  <div class="container">
    <div class="icon-404" aria-hidden="true">
      <!-- SVG illustration modern, friendly -->
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="36" cy="36" r="36" fill="#e3e6ea"/>
        <ellipse cx="36" cy="54" rx="18" ry="4" fill="#c9ced6"/>
        <ellipse cx="26" cy="32" rx="3" ry="5" fill="#232946"/>
        <ellipse cx="46" cy="32" rx="3" ry="5" fill="#232946"/>
        <path d="M28 44c2.5 2.5 13.5 2.5 16 0" stroke="#f25f4c" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="oops-wrapper">
      <span class="oops-letter">O</span>
      <span class="oops-letter">o</span>
      <span class="oops-letter">p</span>
      <span class="oops-letter">s</span>
      <span class="oops-exclamation">!</span>
    </div>
    <p class="message">The page you are looking for doesn't exist or has been moved.</p>
    <div class="button-group">
      <a href="https://komvbgh.eu.org" class="btn">Back to Home</a>
      <a href="#" class="btn btn-outline">Report a Problem</a>
    </div>
  </div>
  <script src="404.js"></script>
</body>
</html>
